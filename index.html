<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Autonomous System v4.5</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --dark-bg: #0b0f19;
            --panel-bg: rgba(16, 22, 37, 0.98);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #nexus-overlay {
            width: 100%; background: var(--panel-bg);
            border-bottom: 2px solid var(--neon-blue);
            padding: 8px 12px; box-sizing: border-box; z-index: 9999;
        }

     .header-row { display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 14px; color: var(--neon-blue); letter-spacing: 1px; }
        
     .history-box {
            display: flex; gap: 4px; background: rgba(0,0,0,0.3);
            padding: 4px 8px; border-radius: 4px; font-size: 11px;
        }
     .hist-dot { width: 8px; height: 8px; border-radius: 50%; }
     .dot-low { background: #ff4757; }
     .dot-high { background: var(--neon-green); }

        #alert-box {
            background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 6px; padding: 10px; text-align: center;
            font-size: 13px; font-weight: bold; color: #aaa; margin-top: 6px;
            transition: all 0.3s ease;
        }

        #game-container { flex: 1; width: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="nexus-overlay">
        <div class="header-row">
            <h1>NEXUS AUTO-ANALYSIS v4.5</h1>
            <div class="history-box" id="history-container">
                <span style="color:#666; font-size:10px; margin-right:4px;">HISTÓRICO:</span>
            </div>
        </div>
        <div id="alert-box">📡 AGUARDANDO PRIMEIRAS VELAS DO CATALOGADOR...</div>
    </div>

    <div id="game-container">
        <iframe src="https://sortenabet.bet.br"></iframe>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://nexus-painel-c9f5e-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref("ultimas_velas");

        dbRef.limitToLast(1).on("child_added", (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                extrairEProcessarVela(dados);
            }
        });

        function extrairEProcessarVela(dados) {
            let valor = null;
            
            if (typeof dados === "number") {
                valor = dados;
            } else if (typeof dados === "object") {
                valor = dados.payout || dados.value || dados.multiplier || dados.valor || dados.resultado || (dados.data && (dados.data.payout || dados.data.multiplier));
            }
            
            if (valor!== null &&!isNaN(parseFloat(valor))) {
                processarNovaVelaDaAPI(parseFloat(valor));
            }
        }

        let historicoAutomatico =;

        function processarNovaVelaDaAPI(valorVela) {
            let tipo = (valorVela >= 2.00)? 'alta' : 'baixa';
            
            if (historicoAutomatico.length >= 5) {
                historicoAutomatico.shift();
            }
            historicoAutomatico.push(tipo);

            atualizarPainelVisual();
            executarAlgoritmoEstrategia();
        }

        function atualizarPainelVisual() {
            const container = document.getElementById('history-container');
            container.innerHTML = '<span style="color:#666; font-size:10px; margin-right:4px;">HIST:</span>';
            historicoAutomatico.forEach(item => {
                const dot = document.createElement('div');
                dot.className = `hist-dot dot-${item}`;
                container.appendChild(dot);
            });
        }

        function ejecutarAlgoritmoEstrategia() {
            const alertBox = document.getElementById('alert-box');
            
            let baixasSeguidas = 0;
            for(let i = historicoAutomatico.length - 1; i >= 0; i--) {
                if(historicoAutomatico[i] === 'baixa') baixasSeguidas++;
                else break;
            }

            if (baixasSeguidas === 3) {
                alertBox.style.background = "rgba(241, 196, 15, 0.1)";
                alertBox.style.border = "1px solid #f1c40f";
                alertBox.style.color = "#f1c40f";
                alertBox.innerHTML = "⚠️ PADRÃO DETECTADO: 3 velas baixas seguidas. Atenção para a próxima rodada!";
            } else if (baixasSeguidas >= 4) {
                alertBox.style.background = "rgba(57, 255, 20, 0.15)";
                alertBox.style.border = "1px solid var(--neon-green)";
                alertBox.style.color = var(--neon-green);
                alertBox.innerHTML = "🎯 ENTRADA CONFIRMADA: Padrão de quebra de sequência detectado. Buscar ≥ 2.00x!";
            } else if (historicoAutomatico[historicoAutomatico.length - 1] === 'alta') {
                alertBox.style.background = "rgba(0, 242, 254, 0.1)";
                alertBox.style.border = "1px solid var(--neon-blue)";
                alertBox.style.color = var(--neon-blue);
                alertBox.innerHTML = "✅ VELA ALTA REGISTRADA. Monitorando próximo ciclo de análise.";
            } else {
                alertBox.style.background = "rgba(255, 255, 255, 0.03)";
                alertBox.style.border = "1px dashed rgba(255, 255, 255, 0.2)";
                alertBox.style.color = "#aaa";
                alertBox.innerHTML = `📡 Analisando histórico... (${baixasSeguidas} velas baixas consecutivas)`;
            }
        }
    </script>
</body>
</html>
