<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Panel v3.0 - Mobile Integrado</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --dark-bg: #0b0f19;
            --panel-bg: rgba(16, 22, 37, 0.95);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Painel Superior Flutuante */
        #nexus-overlay {
            width: 100%;
            background: var(--panel-bg);
            border-bottom: 2px solid var(--neon-blue);
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.2);
            box-sizing: border-box;
            z-index: 9999;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 16px;
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 11px;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* Área de Exibição do Jogo */
        #game-container {
            flex: 1;
            width: 100%;
            position: relative;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Controle de URL para você mudar de site se quiser */
        .url-bar {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .url-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .btn-load {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- PAINEL NEXUS (Fica fixo no topo) -->
    <div id="nexus-overlay">
        <div class="header-row">
            <h1>NEXUS MOBILE v3.0</h1>
            <span class="status-badge">● MONITORATIVO</span>
        </div>
        
        <div class="url-bar">
            <input type="text" id="target-url" class="url-input" value="https://sortenabet.bet.br" placeholder="Digite a URL da bet...">
            <button class="btn-load" onclick="carregarJogo()">ABRIR</button>
        </div>
    </div>

    <!-- JANELA DO JOGO (Carrega o site aqui dentro) -->
    <div id="game-container">
        <iframe id="game-frame" src="https://sortenabet.bet.br"></iframe>
    </div>

    <script>
        function carregarJogo() {
            let url = document.getElementById('target-url').value;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            document.getElementById('game-frame').src = url;
        }

        // Script de monitoramento interno simplificado para rodar direto no container
        console.log("Nexus Core carregado no ambiente mobile.");
    </script>
</body>
</html>
